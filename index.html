<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soccer Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#080c10;
      --surface:#0f1520;
      --surface2:#161e2e;
      --border:#1d2d44;
      --accent:#00e5ff;
      --accent2:#39ff8f;
      --danger:#ff3a5c;
      --text:#dce8f5;
      --muted:#5a7394;
      --radius:12px;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'DM Sans', sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }

    .container {
      position:relative;
      z-index:1;
      max-width:520px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .app-header {
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:22px;
    }
    .app-header .ball { font-size:28px; }
    .app-header h1 {
      font-family:'Barlow Condensed', sans-serif;
      font-size:26px;
      font-weight:800;
      color:var(--accent);
      text-transform:uppercase;
    }

    /* Tabs */
    .tabs {
      display:flex;
      gap:8px;
      margin-bottom:20px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:4px;
    }

    .tab-btn {
      flex:1;
      background:transparent;
      color:var(--muted);
      border:none;
      border-radius:9px;
      padding:10px;
      cursor:pointer;
      font-family:'Barlow Condensed';
      font-size:15px;
      font-weight:700;
      text-transform:uppercase;
    }

    .tab-btn.active {
      background:var(--accent);
      color:#000;
    }

    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title {
      font-family:'Barlow Condensed';
      font-size:18px;
      font-weight:700;
      color:var(--accent);
      margin-bottom:14px;
      text-transform:uppercase;
    }

    input[type="date"], input[type="text"] {
      width:100%;
      padding:10px 14px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--bg);
      color:var(--text);
    }

    .add-row {
      display:flex;
      gap:8px;
      margin-bottom:4px;
    }

    .add-btn {
      background:var(--accent);
      color:#000;
      border:none;
      padding:10px 16px;
      border-radius:8px;
      font-size:20px;
      cursor:pointer;
    }

    .save-btn {
      background:var(--accent);
      color:#000;
      width:100%;
      margin-top:12px;
      border:none;
      border-radius:10px;
      padding:12px;
      font-weight:800;
      text-transform:uppercase;
      cursor:pointer;
    }

    #log { display:none; }
    #newGame { display:none; }

  </style>
</head>

<body>
<div class="container">

  <div class="app-header">
    <span class="ball">⚽</span>
    <h1>Soccer Tracker</h1>
  </div>

  <div class="tabs">
    <button id="homeTab" class="tab-btn active">Home</button>
    <button id="newGameTab" class="tab-btn">New Game</button>
    <button id="logTab" class="tab-btn">Log</button>
  </div>

  <!-- HOME -->
  <div id="home">
    <div id="homeSummary" class="card">
      <div class="card-title">📋 Game ON!</div>
      <div id="summaryDate"></div>
      <div id="summaryPlayerList"></div>
    </div>
  </div>

  <!-- NEW GAME TAB (MOVED HERE) -->
  <div id="newGame">

    <div class="card">
      <div class="card-title">📅 New Game</div>

      <input type="date" id="date">

      <div class="add-row">
        <input type="text" id="playerName" placeholder="Player name">
        <button class="add-btn" onclick="addPlayer()">+</button>
      </div>

      <div id="playerList"></div>

      <button class="save-btn" onclick="saveGame()">💾 Save Game</button>
    </div>

  </div>

  <!-- LOG -->
  <div id="log"></div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyC91k_f2uhFlf-Jg4jfyAgos_AD38jvwGw",
    authDomain: "soccer-tracker-910b4.firebaseapp.com",
    projectId: "soccer-tracker-910b4"
  });

  const db = getFirestore(app);

  let players = [];

  /* Tabs */
  document.getElementById("homeTab").onclick = () => switchTab("home");
  document.getElementById("newGameTab").onclick = () => switchTab("newGame");
  document.getElementById("logTab").onclick = () => switchTab("log");

  function switchTab(tab) {
    const isHome = tab === "home";
    const isNew = tab === "newGame";

    document.getElementById("home").style.display = isHome ? "block" : "none";
    document.getElementById("newGame").style.display = isNew ? "block" : "none";
    document.getElementById("log").style.display = (!isHome && !isNew) ? "block" : "none";

    document.getElementById("homeTab").classList.toggle("active", isHome);
    document.getElementById("newGameTab").classList.toggle("active", isNew);
    document.getElementById("logTab").classList.toggle("active", !isHome && !isNew);
  }

  /* Players */
  window.addPlayer = function () {
    const input = document.getElementById("playerName");
    if (!input.value.trim()) return;
    players.push({ name: input.value.trim(), paid:false, didNotAttend:false });
    input.value = "";
    renderPlayers();
  };

  function renderPlayers() {
    const list = document.getElementById("playerList");
    list.innerHTML = players.map((p,i)=>`
      <div>${i+1}. ${p.name}</div>
    `).join("");
  }

  window.saveGame = async function () {
    const date = document.getElementById("date").value;
    if (!date) return alert("Pick date");

    await addDoc(collection(db,"games"), { date, players });

    alert("Saved!");
    players = [];
    renderPlayers();
  };

</script>
</body>
</html>
