<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soccer Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0b0f14;
      color: #e6f1ff;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 16px;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      background: #111827;
      color: #9ca3af;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #1f2937;
      cursor: pointer;
    }

    .active {
      background: #00f7ff;
      color: black;
      box-shadow: 0 0 10px #00f7ff;
    }

    /* CARD */
    .card {
      background: #111827;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #1f2937;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: #0b0f14;
      color: white;
      font-size: 16px;
    }

    /* ================================
       FIX: SINGLE SHARED GRID SYSTEM
       ================================ */

    .grid-header,
    .row {
      display: grid;
      grid-template-columns: 1fr 60px 60px;
      align-items: center;
      column-gap: 10px;
    }

    /* HEADER */
    .grid-header {
      font-size: 12px;
      color: #9ca3af;
      margin: 10px 0 6px;
      text-align: center;
    }

    /* PLAYER ROW */
    .row {
      padding: 6px 8px;
      margin-bottom: 4px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
    }

    .name {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .number {
      color: #00f7ff;
      font-weight: bold;
      min-width: 22px;
    }

    /* BUTTONS */
    .add-btn {
      background: #00f7ff;
      color: black;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .save-btn {
      background: #00f7ff;
      color: black;
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      padding: 10px;
      border: none;
      font-weight: bold;
    }

    .small-btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* SUMMARY */
    .summary-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid #1f2937;
    }

    .summary-title {
      color: #00f7ff;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .stats {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(0,255,255,0.05);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
    }

    /* CHECKBOX CENTERING */
    input[type="checkbox"] {
      transform: scale(1.1);
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <button id="homeTab" class="tab-btn active">Home</button>
    <button id="logTab" class="tab-btn">Log</button>
  </div>

  <!-- HOME -->
  <div id="home">
    <div class="card">
      <h3>This Week's Game</h3>

      <input type="date" id="date">

      <div style="display:flex; gap:6px;">
        <input id="playerName" placeholder="Player name">
        <button class="add-btn" onclick="addPlayer()">+</button>
      </div>

      <div id="playerList"></div>

      <button class="save-btn" onclick="saveGame()">Save Game</button>

      <div id="summary" class="summary-box" style="display:none;"></div>
    </div>
  </div>

  <!-- LOG -->
  <div id="log" style="display:none;"></div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC91k_f2uhFlf-Jg4jfyAgos_AD38jvwGw",
    authDomain: "soccer-tracker-910b4.firebaseapp.com",
    projectId: "soccer-tracker-910b4",
    storageBucket: "soccer-tracker-910b4.firebasestorage.app",
    messagingSenderId: "1021814716916",
    appId: "1:1021814716916:web:c8007db5a5f7671d04a1a1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let players = [];

  /* ---------------- TABS ---------------- */
  homeTab.onclick = () => {
    home.style.display = "block";
    log.style.display = "none";
    homeTab.classList.add("active");
    logTab.classList.remove("active");
  };

  logTab.onclick = () => {
    home.style.display = "none";
    log.style.display = "block";
    logTab.classList.add("active");
    homeTab.classList.remove("active");
    loadLogs();
  };

  /* ---------------- PLAYERS ---------------- */
  window.addPlayer = function () {
    const name = document.getElementById("playerName").value;
    if (!name) return;

    players.push({ name, paid: false, didNotAttend: false });
    document.getElementById("playerName").value = "";
    renderPlayers();
  };

  function renderPlayers() {
    const list = document.getElementById("playerList");
    list.innerHTML = "";

    // HEADER (aligned to grid)
    list.innerHTML += `
      <div class="grid-header">
        <div></div>
        <div>DNP</div>
        <div>Paid</div>
      </div>
    `;

    players.forEach((p, i) => {
      list.innerHTML += `
        <div class="row">
          <div class="name">
            <span class="number">${i + 1}.</span>
            <span>${p.name}</span>
          </div>

          <input type="checkbox" ${p.didNotAttend ? "checked" : ""}>

          <input type="checkbox" ${p.paid ? "checked" : ""} onchange="togglePaid(${i})">
        </div>
      `;
    });
  }

  window.togglePaid = function (i) {
    players[i].paid = !players[i].paid;
    renderPlayers();
  };

  /* ---------------- SAVE ---------------- */
  window.saveGame = async function () {
    const date = document.getElementById("date").value;
    if (!date || players.length === 0) return alert("Enter date and players");

    await addDoc(collection(db, "games"), { date, players });

    players = [];
    renderPlayers();
    document.getElementById("date").value = "";

    loadLogs();
  };

  /* ---------------- LOG ---------------- */
  async function loadLogs() {
    const snapshot = await getDocs(collection(db, "games"));
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "";

    snapshot.forEach(docSnap => {
      const game = docSnap.data();

      let html = `
        <div class="card">
          <h4>${new Date(game.date).toDateString()}</h4>

          <div class="grid-header">
            <div></div>
            <div>DNP</div>
            <div>Paid</div>
          </div>
      `;

      game.players.forEach((p, i) => {
        html += `
          <div class="row">
            <div class="name">
              <span class="number">${i + 1}.</span>
              <span>${p.name}</span>
            </div>

            <input type="checkbox" ${p.didNotAttend ? "checked" : ""}>
            <input type="checkbox" ${p.paid ? "checked" : ""}>
          </div>
        `;
      });

      html += `</div>`;
      logDiv.innerHTML += html;
    });
  }

</script>

</body>
</html>
